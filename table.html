<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            width:100%;
            border-collapse: collapse;

        }

        td,th{
            border: 1px solid black
        }

    </style>
</head>
<body>
    <table>
        <tr>
            <th>row 1</th>
            <th>row 2</th>
            <th>row 3</th>
        </tr>

        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
            <td>9</td>
        </tr>
        <!-- <tc>
            <th>col 1</th>
            <th>col 2</th>
            <th>col 3</th>
        </tc> -->
    </table>
</body>
</html>
